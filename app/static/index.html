<!-- static/index.html -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bibry</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>#grid,#list{height:calc(100vh - 110px);overflow-y:auto;overflow-x:hidden}body{padding:1rem;background:#f5f5f5}.toolbar input,.toolbar select{height:30px}#grid{display:flex;align-items:flex-start;gap:12px;padding:6px}#list{padding:6px;display:none}.grid-column{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:12px}.card{display:block;width:100%;padding:12px;margin:0;background:#fff;border:1px solid #ddd;border-radius:6px;transition:background .15s,border-color .15s;cursor:pointer}.card:hover{background:#f8f9fa}.card.is-selected{border-color:#0d6efd}.actions{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}.bib-entry-title,.bib-entry-meta,.bib-entry-muted{overflow-wrap:break-word;word-break:normal}.bib-entry-title{font-weight:700;color:inherit}.bib-entry-meta{color:#212529}.bib-entry-muted{color:#6c757d}.bib-entry-author{display:block;margin-top:.5em}.entry-status-icons{display:inline-flex;gap:.35rem;vertical-align:middle}.entry-status-icon{display:inline-flex;align-items:center;justify-content:center;font-size:.8rem}.entry-status-retracted{color:#b02a37}.entry-status-withdrawn{color:#8a6d1d}.view-empty{display:flex !important;align-items:center;justify-content:center}.empty-state{max-width:32rem;text-align:center;color:#6c757d;font-size:1.15rem;line-height:1.5;padding:2rem}.toolbar{flex-wrap:wrap}#search{width:220px}.btn-group .btn.active{background:#0d6efd;color:#fff;border-color:#0d6efd}#editRaw{font-family:monospace;height:70vh}.picker-backdrop,.scan-backdrop{position:fixed;inset:0;background:rgba(33,37,41,.4);display:none;align-items:center;justify-content:center;padding:1rem;z-index:1050}.picker-backdrop.open,.scan-backdrop.open{display:flex}.picker-modal,.scan-modal{width:min(920px,100%);max-height:88vh;background:#fff;border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}.picker-header,.picker-footer,.scan-header,.scan-footer{padding:.9rem 1rem;border-bottom:1px solid #e9ecef}.picker-footer,.scan-footer{border-top:1px solid #e9ecef;border-bottom:0}.picker-body{padding:0;overflow:hidden;display:flex;flex-direction:column}.picker-body.preview-split{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,42%)}.picker-toolbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}.picker-list{padding:.5rem 1rem 1rem;overflow:auto}.picker-item{display:flex;gap:.75rem;align-items:flex-start;padding:.7rem 0;border-bottom:1px solid #f1f3f5}.picker-item:last-child{border-bottom:0}.picker-item-main{min-width:0;flex:1}.picker-key{font-family:monospace;font-size:.85rem;color:#6c757d}.picker-meta{font-size:.9rem;color:#6c757d}.picker-badge{font-size:.72rem}.picker-preview{display:none;border-top:1px solid #e9ecef;background:#f8f9fa;padding:.75rem 1rem;overflow:auto}.picker-body.preview-split .picker-preview{display:block;border-top:0;border-left:1px solid #e9ecef}.picker-preview.open{display:block}.picker-preview-body{max-height:none;overflow:auto}.picker-actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:flex-end}.scan-service-list{padding:1rem;display:flex;flex-direction:column;gap:.75rem}.scan-service{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;border:1px solid #e9ecef;border-radius:.75rem;padding:.9rem;background:#fafbfc}.scan-service-info{min-width:0}.scan-status{min-height:1.3rem}.history-change{display:flex;gap:.7rem;align-items:flex-start;padding:.55rem 0;border-bottom:1px solid #e9ecef}.history-change:last-child{border-bottom:0}.history-change-icon{width:1.1rem;text-align:center;margin-top:.1rem}.history-change-fields{margin-top:.3rem;display:flex;flex-direction:column;gap:.15rem}.history-field{font-size:.85rem}.history-before{color:#842029;text-decoration:line-through;background:rgba(220,53,69,.09);padding:0 .15rem;border-radius:.2rem}.history-after{color:#0f5132;background:rgba(25,135,84,.11);padding:0 .15rem;border-radius:.2rem}.history-arrow{color:#6c757d;padding:0 .2rem}.scan-preview-raw{display:grid;grid-template-columns:1fr;gap:.75rem}.scan-preview-raw pre{white-space:pre-wrap;word-break:break-word;font-size:.78rem;background:#fff;border:1px solid #dee2e6;border-radius:.5rem;padding:.6rem;margin:0}.drop-overlay{position:fixed;inset:0;border:3px dashed #0d6efd;background:rgba(13,110,253,.08);display:none;align-items:center;justify-content:center;z-index:1040;pointer-events:none}.drop-overlay.open{display:flex}.drop-overlay-content{background:#fff;color:#0d6efd;padding:.8rem 1rem;border-radius:999px;box-shadow:0 12px 28px rgba(13,110,253,.15);font-weight:600}.toast-hint{position:fixed;right:1rem;bottom:1rem;background:rgba(33,37,41,.92);color:#fff;padding:.6rem .85rem;border-radius:999px;font-size:.9rem;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .16s ease,transform .16s ease;z-index:1060}.toast-hint.show{opacity:1;transform:translateY(0)}@media (max-width:768px){#grid{display:block}#grid .grid-column{display:block}#grid .grid-column + .grid-column{display:none}.grid-column .card{margin-bottom:12px}#editRaw{height:180px}.picker-modal,.scan-modal{max-height:92vh}.picker-body.preview-split{grid-template-columns:1fr}.picker-body.preview-split .picker-preview{border-left:0;border-top:1px solid #e9ecef;max-height:38vh}.picker-actions{justify-content:flex-start}.scan-service{flex-direction:column;align-items:stretch}}
    </style>
  </head>
<body>
    <div class="container-fluid">
      <div class="toolbar d-flex flex-wrap align-items-center gap-2 mb-2">
        <input id="search" class="form-control form-control-sm" placeholder="Search">
        <button id="bibFileBtn" class="btn btn-sm btn-outline-dark">main.bib</button>
        <div class="btn-group btn-group-sm" role="group">
          <button class="btn btn-outline-secondary sort-btn active" data-sort="year">Year</button>
          <button class="btn btn-outline-secondary sort-btn" data-sort="author">Author</button>
          <button class="btn btn-outline-secondary sort-btn" data-sort="title">Title</button>
        </div>
        <button id="sortDirBtn" class="btn btn-sm btn-outline-secondary">↓</button>
        <button id="viewToggleBtn" class="btn btn-sm btn-outline-secondary">
          <i class="fa fa-list" aria-hidden="true"></i>
        </button>
        <button id="importToolbarBtn" class="btn btn-sm btn-outline-primary">Import</button>
        <button id="scanToolbarBtn" class="btn btn-sm btn-outline-primary">Scan</button>
        <button id="exportToolbarBtn" class="btn btn-sm btn-outline-primary">Export</button>
        <button id="historyToolbarBtn" class="btn btn-sm btn-outline-secondary">History</button>
        <input id="bibFileInput" type="file" accept=".bib,text/x-bibtex,application/x-bibtex" hidden>
      </div>

      <div class="row">
        <div class="col-md-8 order-2 order-md-1">
          <div id="grid"></div>
          <div id="list"></div>
        </div>
        <div class="col-md-4 order-1 order-md-2">
          <textarea id="editRaw" class="form-control" style="height:70vh; font-family: monospace;"></textarea>
          <!-- Editor controls -->
          <div id="editorControls" class="mt-2 d-flex gap-2">
            <button id="saveBtn" class="btn btn-sm btn-primary">Save</button>
            <button id="cancelBtn" class="btn btn-sm btn-secondary">Cancel</button>
            <button id="addBtn" class="btn btn-sm btn-success">Add</button>
            <button id="undoBtn" class="btn btn-sm btn-warning">Undo</button>
            <button id="copyBtn" class="btn btn-sm btn-outline-secondary">Copy</button>
          </div>
        </div>
      </div>
    </div>
    <div id="pickerBackdrop" class="picker-backdrop" aria-hidden="true">
      <div class="picker-modal" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
        <div class="picker-header">
          <div class="d-flex justify-content-between align-items-center gap-2">
            <div>
              <div id="pickerTitle" class="fw-semibold">Select Entries</div>
              <div id="pickerSubtitle" class="small text-muted"></div>
            </div>
            <button id="pickerCloseBtn" class="btn btn-sm btn-outline-secondary">Close</button>
          </div>
          <div class="picker-toolbar mt-2">
            <input id="pickerSearch" class="form-control form-control-sm" placeholder="Search entries">
            <button id="pickerSelectVisibleBtn" class="btn btn-sm btn-outline-secondary">Select Visible</button>
            <button id="pickerClearBtn" class="btn btn-sm btn-outline-secondary">Clear</button>
          </div>
        </div>
        <div class="picker-body">
          <div id="pickerList" class="picker-list"></div>
          <div id="pickerPreview" class="picker-preview">
            <div id="pickerPreviewLabel" class="small text-muted mb-2"></div>
            <div id="pickerPreviewText" class="picker-preview-body"></div>
          </div>
        </div>
        <div class="picker-footer d-flex justify-content-between align-items-center gap-2">
          <div id="pickerSelectionInfo" class="small text-muted"></div>
          <div id="pickerActions" class="picker-actions">
            <button id="pickerConfirmBtn" class="btn btn-sm btn-primary">Confirm</button>
          </div>
        </div>
      </div>
    </div>
    <div id="scanBackdrop" class="scan-backdrop" aria-hidden="true">
      <div class="scan-modal" role="dialog" aria-modal="true" aria-labelledby="scanTitle">
        <div class="scan-header">
          <div class="d-flex justify-content-between align-items-center gap-2">
            <div>
              <div id="scanTitle" class="fw-semibold">Run Scan</div>
              <div class="small text-muted">Choose the metadata source to scan against. Scans can take minutes.</div>
            </div>
            <button id="scanCloseBtn" class="btn btn-sm btn-outline-secondary">Close</button>
          </div>
        </div>
        <div id="scanServiceList" class="scan-service-list"></div>
        <div class="scan-footer d-flex justify-content-between align-items-center gap-2">
          <div id="scanStatus" class="small text-muted scan-status">Choose a scan source.</div>
          <button id="scanClearRejectionsBtn" class="btn btn-sm btn-outline-secondary">Clear Past Rejections</button>
        </div>
      </div>
    </div>
    <div id="dropOverlay" class="drop-overlay" aria-hidden="true">
      <div class="drop-overlay-content">Drop a .bib file to import</div>
    </div>
    <div id="toastHint" class="toast-hint" role="status" aria-live="polite"></div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
